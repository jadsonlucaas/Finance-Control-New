<!doctype html>
<html lang="pt-BR" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Pessoal</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <script type="module" src="/src/app.js"></script>
</head>

<body class="h-full text-textPrimary overflow-hidden">
    <div id="auth-root"></div>
    <div id="app" class="h-full flex flex-col relative hidden">
        <!-- Sidebar Navigation -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm"></div>
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 glass-panel z-50 transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col border-r border-surfaceLight shadow-2xl bg-surface">
            <div class="p-4 border-b border-surfaceLight flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-accent/20 flex items-center justify-center">
                        <i data-lucide="wallet" class="w-4 h-4 text-accent"></i>
                    </div>
                    <span class="font-bold text-textPrimary text-lg">Menu</span>
                </div>
                <button id="btn-sidebar-close" type="button" class="p-1 rounded-lg hover:bg-surfaceLight text-textSecondary hover:text-textPrimary transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <nav class="flex-1 overflow-y-auto p-3 space-y-1" id="main-tabs">
                <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors bg-accent/10 text-accent" data-tab="dashboard"><i data-lucide="bar-chart-3" class="w-5 h-5"></i>Dashboard</button>
                <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-textSecondary hover:bg-surfaceLight hover:text-textPrimary" data-tab="saidas"><i data-lucide="arrow-up-right" class="w-5 h-5 text-danger"></i>Saídas</button>
                <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-textSecondary hover:bg-surfaceLight hover:text-textPrimary" data-tab="entradas"><i data-lucide="arrow-down-left" class="w-5 h-5 text-success"></i>Entradas</button>
                <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-textSecondary hover:bg-surfaceLight hover:text-textPrimary" data-tab="importacao"><span class="flex h-8 w-8 items-center justify-center rounded-full bg-surfaceLight border border-white/60 shadow-sm text-accent"><i data-lucide="upload" class="w-4 h-4"></i></span>Importacao</button>
                <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-textSecondary hover:bg-surfaceLight hover:text-textPrimary" data-tab="controle-horas"><i data-lucide="clock-3" class="w-5 h-5 text-accent"></i>Controle de Horas</button>
                <hr class="border-surfaceLight my-2">
                <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-textSecondary hover:bg-surfaceLight hover:text-textPrimary" data-tab="configuracoes"><i data-lucide="settings" class="w-5 h-5"></i>Configurações</button>
            </nav>
        </aside>

        <!-- Header -->
        <header class="mobile-header flex-shrink-0 glass border-b border-surfaceLight px-4 py-3 flex items-center justify-between z-10 sticky top-0">
            <div class="mobile-header-brand flex items-center gap-3">
                <button id="btn-go-back" type="button" title="Voltar para a tela anterior" class="hidden p-2 -ml-2 rounded-lg hover:bg-surfaceLight transition-colors text-textSecondary hover:text-accent">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <button id="btn-mobile-menu" type="button" class="p-2 -ml-2 rounded-lg hover:bg-surfaceLight transition-colors text-textSecondary hover:text-accent">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <button id="btn-dashboard-home" type="button" title="Voltar para o dashboard" class="w-9 h-9 rounded-lg bg-accent/20 hover:bg-accent/30 flex items-center justify-center transition-colors">
                    <i data-lucide="wallet" class="w-5 h-5 text-accent"></i>
                </button>
                <h1 id="app-title" class="mobile-title text-lg font-bold text-textPrimary">Controle Financeiro</h1>
            </div>
            <div class="mobile-header-actions flex items-center gap-2">
                <button id="theme-toggle" type="button"
                    class="text-xs bg-surfaceLight hover:bg-surfaceLight/80 px-3 py-1.5 rounded-lg text-textSecondary hover:text-textPrimary flex items-center gap-1 transition-colors font-medium"
                    title="Alternar entre modo claro e escuro">
                    <i data-lucide="moon" class="w-4 h-4"></i>
                    <span class="mobile-action-label" id="theme-toggle-label">Modo escuro</span>
                </button>
                <button id="btn-new-record-header" type="button"
                    class="text-xs bg-accent hover:bg-accentDark px-3 py-1.5 rounded-lg text-white flex items-center gap-1 transition-colors font-semibold"><i
                        data-lucide="plus-circle" class="w-4 h-4"></i><span class="mobile-action-label">Novo lançamento</span></button>
                <button id="btn-export-pdf" type="button"
                    class="text-xs bg-surfaceLight hover:bg-surfaceLight/80 px-3 py-1.5 rounded-lg text-textSecondary hover:text-accent flex items-center gap-1 transition-colors"><i
                        data-lucide="file-text" class="w-4 h-4"></i><span class="mobile-action-label">Relatório PDF</span></button>
            </div>
        </header>
        <main class="flex-1 overflow-auto p-4" id="main-content"></main><!-- Delete confirmation overlay -->
        <div id="delete-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[420]">
            <div class="bg-surface rounded-xl p-5 border border-surfaceLight max-w-sm mx-4">
                <p class="text-sm mb-4">Tem certeza que deseja excluir este lançamento?</p>
                <div class="flex gap-2 justify-end">
                    <button id="btn-cancel-delete" type="button"
                        class="px-3 py-1.5 text-sm text-textSecondary bg-surfaceLight rounded-lg">Cancelar</button><button
                        id="btn-confirm-delete" type="button"
                        class="px-3 py-1.5 text-sm text-white bg-danger rounded-lg">Excluir</button>
                </div>
            </div>
        </div><!-- Delete Person confirmation overlay -->
        <div id="delete-person-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[420]">
            <div class="bg-surface rounded-xl p-5 border border-surfaceLight max-w-sm mx-4">
                <p id="delete-person-msg" class="text-sm mb-4"></p>
                <div class="flex gap-2 justify-end">
                    <button id="btn-cancel-delete-person" type="button"
                        class="px-3 py-1.5 text-sm text-textSecondary bg-surfaceLight rounded-lg">Cancelar</button><button
                        id="btn-confirm-delete-person" type="button"
                        class="px-3 py-1.5 text-sm text-white bg-danger rounded-lg">Excluir</button>
                </div>
            </div>
        </div><!-- Delete Macro Category confirmation overlay -->
        <div id="delete-macro-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[420]">
            <div class="bg-surface rounded-xl p-5 border border-surfaceLight max-w-sm mx-4">
                <p id="delete-macro-msg" class="text-sm mb-4"></p>
                <div class="flex gap-2 justify-end">
                    <button id="btn-cancel-delete-macro" type="button"
                        class="px-3 py-1.5 text-sm text-textSecondary bg-surfaceLight rounded-lg">Cancelar</button><button
                        id="btn-confirm-delete-macro" type="button"
                        class="px-3 py-1.5 text-sm text-white bg-danger rounded-lg">Excluir</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
